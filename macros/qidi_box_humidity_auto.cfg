[gcode_macro BOX_HUMIDITY_AUTO]
description: Box humidity maintenance state for the active Qidi heater box
variable_enabled: 0
variable_target_temp: 40
variable_humidity_high: 19
variable_humidity_low: 14
variable_poll_seconds: 30
gcode:
    {% set ctrl = printer["gcode_macro BOX_HUMIDITY_AUTO"] %}
    {% set humidity = printer["aht20_f heater_box1"].humidity|float %}
    {% set box = printer["heater_generic heater_box1"] %}
    RESPOND MSG="Box humidity auto enabled={ctrl.enabled|int} humidity={humidity|int}% box={(box.temperature|float)|round(1)}C target={(box.target|float)|round(1)}C band={ctrl.humidity_low|int}-{ctrl.humidity_high|int}% hold={ctrl.target_temp|int}C poll={ctrl.poll_seconds|int}s"

[gcode_macro BOX_HUMIDITY_AUTO_ENABLE]
description: Enable automatic Qidi box humidity maintenance
gcode:
    {% set temp = params.TEMP|default(printer["gcode_macro BOX_HUMIDITY_AUTO"].target_temp)|float %}
    {% set high = params.HIGH|default(printer["gcode_macro BOX_HUMIDITY_AUTO"].humidity_high)|float %}
    {% set low = params.LOW|default(printer["gcode_macro BOX_HUMIDITY_AUTO"].humidity_low)|float %}
    {% set poll = params.POLL|default(printer["gcode_macro BOX_HUMIDITY_AUTO"].poll_seconds)|int %}
    {% if low >= high %}
        { action_raise_error("LOW must be less than HIGH for BOX_HUMIDITY_AUTO_ENABLE") }
    {% endif %}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=target_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=humidity_high VALUE={high}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=humidity_low VALUE={low}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=poll_seconds VALUE={poll}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=enabled VALUE=1
    SAVE_VARIABLE VARIABLE=box_humidity_auto_enabled VALUE=1
    SAVE_VARIABLE VARIABLE=box_humidity_auto_target_temp VALUE={temp}
    SAVE_VARIABLE VARIABLE=box_humidity_auto_humidity_high VALUE={high}
    SAVE_VARIABLE VARIABLE=box_humidity_auto_humidity_low VALUE={low}
    SAVE_VARIABLE VARIABLE=box_humidity_auto_poll_seconds VALUE={poll}
    UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_WATCH DURATION=1
    UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_KEEPALIVE DURATION=60
    RESPOND MSG="Box humidity auto enabled: >={high|int}% turns heater on at {temp|int}C, <={low|int}% turns it off"

[gcode_macro BOX_HUMIDITY_AUTO_DISABLE]
description: Disable automatic Qidi box humidity maintenance and turn off the box heater
gcode:
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=enabled VALUE=0
    SAVE_VARIABLE VARIABLE=box_humidity_auto_enabled VALUE=0
    UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_WATCH DURATION=0
    UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_KEEPALIVE DURATION=0
    SET_HEATER_TEMPERATURE HEATER=heater_box1 TARGET=0
    RESPOND MSG="Box humidity auto disabled and box heater turned off"

[gcode_macro BOX_HUMIDITY_AUTO_STATUS]
description: Report current automatic Qidi box humidity maintenance state
gcode:
    BOX_HUMIDITY_AUTO

[delayed_gcode BOX_HUMIDITY_AUTO_INIT]
initial_duration: 2.0
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set enabled = svv.box_humidity_auto_enabled|default(0)|int %}
    {% set temp = svv.box_humidity_auto_target_temp|default(40)|float %}
    {% set high = svv.box_humidity_auto_humidity_high|default(19)|float %}
    {% set low = svv.box_humidity_auto_humidity_low|default(14)|float %}
    {% set poll = svv.box_humidity_auto_poll_seconds|default(30)|int %}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=target_temp VALUE={temp}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=humidity_high VALUE={high}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=humidity_low VALUE={low}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=poll_seconds VALUE={poll}
    SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=enabled VALUE={enabled}
    {% if enabled %}
        UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_WATCH DURATION=5
        UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_KEEPALIVE DURATION=60
        RESPOND MSG="Box humidity auto restored: >={high|int}% on, <={low|int}% off, hold {temp|int}C"
    {% endif %}

[delayed_gcode BOX_HUMIDITY_AUTO_KEEPALIVE]
initial_duration: 60
gcode:
    {% set ctrl = printer["gcode_macro BOX_HUMIDITY_AUTO"] %}
    {% set saved_enabled = printer.save_variables.variables.box_humidity_auto_enabled|default(ctrl.enabled)|int %}
    {% if saved_enabled %}
        {% if not ctrl.enabled|int %}
            SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=enabled VALUE=1
        {% endif %}
        UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_WATCH DURATION=1
        UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_KEEPALIVE DURATION=60
    {% endif %}

[delayed_gcode BOX_HUMIDITY_AUTO_WATCH]
initial_duration: 0
gcode:
    {% set ctrl = printer["gcode_macro BOX_HUMIDITY_AUTO"] %}
    {% if ctrl.enabled|int %}
        {% set humidity = printer["aht20_f heater_box1"].humidity|float %}
        {% set heater = printer["heater_generic heater_box1"] %}
        {% set current_target = heater.target|float %}
        {% set hold_temp = ctrl.target_temp|float %}
        {% set high = ctrl.humidity_high|float %}
        {% set low = ctrl.humidity_low|float %}
        {% if current_target > 0.1 and (current_target - hold_temp)|abs > 0.1 %}
            SET_GCODE_VARIABLE MACRO=BOX_HUMIDITY_AUTO VARIABLE=enabled VALUE=0
            SAVE_VARIABLE VARIABLE=box_humidity_auto_enabled VALUE=0
            RESPOND MSG="Manual box drying target {(current_target|float)|round(1)}C detected; box humidity auto disabled"
        {% elif humidity >= high and current_target < (hold_temp - 0.1) %}
            SET_HEATER_TEMPERATURE HEATER=heater_box1 TARGET={hold_temp}
            RESPOND MSG="Box humidity {humidity|int}% >= {high|int}%: box heater on at {hold_temp|int}C"
        {% elif humidity <= low and current_target > 0.1 %}
            SET_HEATER_TEMPERATURE HEATER=heater_box1 TARGET=0
            RESPOND MSG="Box humidity {humidity|int}% <= {low|int}%: box heater off"
        {% endif %}
        {% if printer["gcode_macro BOX_HUMIDITY_AUTO"].enabled|int %}
            UPDATE_DELAYED_GCODE ID=BOX_HUMIDITY_AUTO_WATCH DURATION={ctrl.poll_seconds|int}
        {% endif %}
    {% endif %}
