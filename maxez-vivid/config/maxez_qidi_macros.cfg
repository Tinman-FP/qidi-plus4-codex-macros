[gcode_macro MOVE_TO_TRASH]
gcode:
    _CG28
    M204 S10000
    {% if (printer.gcode_move.position.y) > 305 %}
        G1 X82.5 Y324 F6000
        G1 X95
    {% else %}
        G1 X82.5 F12000
        G1 Y310 F12000
        G1 Y324 F600
        G1 X95 F6000
    {% endif %}

[gcode_macro EXTRUSION_AND_FLUSH]
gcode:
    {% set hotendtemp = params.HOTEND|int %}
    MOVE_TO_TRASH
    M109 S{hotendtemp}
    M83
    G1 E1 F50
    G1 E28.13 F611
    G1 E0.97 F50
    G1 E8.73 F611
    G1 E0.97 F50
    G1 E8.73 F611
    G1 E0.97 F50
    G1 E-2 F1800
    {% for i in range(1,5) %}
        M106 S255
        M400
        G4 P6000
        CLEAR_FLUSH
        M106 S60
        G1 E34.8 F611
        G1 E1.2 F50
        G1 E10.8 F611
        G1 E1.2 F50
        G1 E10.8 F611
        G1 E1.2 F50
        G1 E-2 F1800
    {% endfor %}
    M106 S255
    M400
    G4 P6000
    CLEAR_FLUSH
    M106 S60


# Excute when start printing, prior to gcode file
[gcode_macro PRINT_START]
variable_heat_soak_minutes: 5
gcode:
    AUTOTUNE_SHAPERS
    DISABLE_ALL_SENSOR
    CLEAR_PAUSE

    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.HOTEND|int %}
    {% set chambertemp = params.CHAMBER|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set soak_minutes = params.SOAKE|default(printer["gcode_macro PRINT_START"].heat_soak_minutes)|int %}
    {% set soak_ms = soak_minutes * 60 * 1000 %}
    set_zoffset
    M104 S0

    M106 P2 S0
    M106 P3 S0
    M106 S255
    {% if "xyz" in printer.toolhead.homed_axes %}
        G0 X50 Y50 F6000
    {% endif %}
    M106 S0
    BED_MESH_CLEAR

    M118 Chamber circulation fan to 100% before heat-up
    M106 P3 S255
    M118 Heating bed, chamber, and nozzle together
    M141 S{chambertemp}
    M140 S{bedtemp}
    M104 S{hotendtemp}
    M190 S{bedtemp}
    {% if chambertemp > 0 %}
        M191 S{chambertemp}
    {% endif %}
    M109 S{hotendtemp}

    {% if soak_minutes > 0 %}
        M118 Heat soaking for {soak_minutes} minute(s)
        G4 P{soak_ms}
    {% endif %}

    M118 Homing before nozzle clear
    G28
    CLEAR_NOZZLE HOTEND={hotendtemp}
    M104 S140
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=260

    M118 Running Z tilt adjust
    Z_TILT_ADJUST

    M118 Running Beacon contact home and adaptive mesh
    G29
    G0 Z20 F600
    G0 X5 Y5 F6000

    {% if printer.save_variables.variables.box_count|default(0)|int >= 1 %}
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        SAVE_VARIABLE VARIABLE=is_tool_change VALUE=0
        {% for i in range(16) %}
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
            G4 P100
        {% endfor %}
        SAVE_VARIABLE VARIABLE=extrude_state VALUE=-1
        {% if printer.save_variables.variables.enable_box|default(0)|int == 1 and printer["box_extras"] is defined %}
            BOX_PRINT_START EXTRUDER={extruder} HOTENDTEMP={hotendtemp}
            M400
            EXTRUSION_AND_FLUSH HOTEND={hotendtemp}
        {% elif printer.save_variables.variables.enable_box|default(0)|int == 1 %}
            RESPOND TYPE=error MSG="Qidi Box requested, but Qidi Box Klipper extras are not active"
        {% endif %}
    {% endif %}

    {% if chambertemp == 0 %}
        M106 P3 S255
    {% endif %}
    M109 S{hotendtemp}
    M141 S{chambertemp}
    M204 S10000
    SET_PRINT_STATS_INFO CURRENT_LAYER=1
    ENABLE_ALL_SENSOR
    save_last_file

[gcode_macro ENABLE_ALL_SENSOR]
gcode:
    {% if printer["hall_filament_width_sensor"] is defined %}
        ENABLE_FILAMENT_WIDTH_SENSOR
        RESET_FILAMENT_WIDTH_SENSOR
        query_filament_width
    {% endif %}
    {% if printer["filament_switch_sensor fila"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=fila ENABLE=1
    {% endif %}
    {% if printer["filament_motion_sensor box_motion_sensor"] is defined and printer.save_variables.variables.enable_box|default(0)|int == 1 %}
        SET_FILAMENT_SENSOR SENSOR=box_motion_sensor ENABLE=1
        CLEAR_MOTION_DATA SENSOR=box_motion_sensor
    {% endif %}

[gcode_macro DISABLE_ALL_SENSOR]
gcode:
    {% if printer["filament_switch_sensor fila"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=fila ENABLE=0
    {% endif %}
    {% if printer["filament_motion_sensor box_motion_sensor"] is defined %}
        SET_FILAMENT_SENSOR SENSOR=box_motion_sensor ENABLE=0
    {% endif %}
    {% if printer["hall_filament_width_sensor"] is defined %}
        DISABLE_FILAMENT_WIDTH_SENSOR
    {% endif %}

[gcode_macro AUTOTUNE_SHAPERS]
variable_autotune_shapers: 'ei'
gcode:

[gcode_macro M84]
rename_existing:M84.1
gcode:
    M84.1
	SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
	SET_STEPPER_ENABLE STEPPER=extruder enable=0

# Used for power lose recovery detection
[gcode_macro DETECT_INTERRUPTION]
gcode:
    {% set was_interrupted = printer.save_variables.variables.was_interrupted %}
    {% if was_interrupted %}
    M118 Detected unexpected interruption during the last print. Do you want to resume printing? (Do not move the extruder before resuming.)
    M118 Yes: RESUME_INTERRUPTED
    M118 No: CLEAR_LAST_FILE
    {% endif %}

# Excute when klipper init
[delayed_gcode PRINTER_INIT]
initial_duration:0.2
gcode:
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
    BED_MESH_CLEAR      
    DISABLE_ALL_SENSOR

# Beacon contact uses its own safe-z-home flow. Do not restore a
# [homing_override] section here unless Beacon contact is disabled first.
[gcode_macro _BEACON_HOME_PRE_X]
gcode:
    _BEACON_HOME_PRE_AXIS AXIS=X

[gcode_macro _BEACON_HOME_POST_X]
gcode:
    _BEACON_HOME_POST_AXIS AXIS=X

[gcode_macro _BEACON_HOME_PRE_Y]
gcode:
    _BEACON_HOME_PRE_AXIS AXIS=Y

[gcode_macro _BEACON_HOME_POST_Y]
gcode:
    _BEACON_HOME_POST_AXIS AXIS=Y

[gcode_macro _BEACON_CONTACT_PRE_Z]
gcode:
    G4 P0

[gcode_macro _BEACON_CONTACT_POST_Z]
gcode:
    G4 P0

[gcode_macro _BEACON_HOME_PRE_AXIS]
description: Lower sensorless homing current before X/Y homes
variable_home_current_x: 0.7
variable_home_current_y: 0.9
gcode:
    {% set axis = params.AXIS|string|upper %}
    M204 S10000
    M220 S100
    {% if axis == "X" %}
        SET_TMC_CURRENT STEPPER=stepper_x CURRENT={printer["gcode_macro _BEACON_HOME_PRE_AXIS"].home_current_x}
    {% elif axis == "Y" %}
        SET_TMC_CURRENT STEPPER=stepper_y CURRENT={printer["gcode_macro _BEACON_HOME_PRE_AXIS"].home_current_y}
    {% endif %}

[gcode_macro _BEACON_HOME_POST_AXIS]
description: Restore X/Y run current and move off the virtual endstop
variable_move_away: 10
gcode:
    {% set axis = params.AXIS|string|upper %}
    {% set move_away = printer["gcode_macro _BEACON_HOME_POST_AXIS"].move_away|float %}
    {% set run_current_x = printer.configfile.settings['tmc2130 stepper_x'].run_current|float %}
    {% set run_current_y = printer.configfile.settings['tmc2130 stepper_y'].run_current|float %}
    SAVE_GCODE_STATE NAME=beacon_home_post_axis
    G91
    {% if axis == "X" %}
        G0 X{move_away} F1200
        SET_TMC_CURRENT STEPPER=stepper_x CURRENT={run_current_x}
    {% elif axis == "Y" %}
        G0 Y{move_away} F1200
        SET_TMC_CURRENT STEPPER=stepper_y CURRENT={run_current_y}
    {% endif %}
    RESTORE_GCODE_STATE NAME=beacon_home_post_axis
    M400
    BEEP I=1 DUR=100

[gcode_macro SHAPER_CALIBRATE]
rename_existing: RESHAPER_CALIBRATE
gcode:
    RESHAPER_CALIBRATE FREQ_START=20 FREQ_END=150

# Excute when print end, after gcode file
[gcode_macro PRINT_END]
gcode:
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    CLEAR_PAUSE
    M400
    G4 P5000
    M106 P2 S0
    M106 P0 S0
    M106 P3 S0
    {% if printer["box_extras"] is defined %}
        DISABLE_BOX_HEATER
    {% endif %}
    
    M104 S0
    M140 S0
    M141 S0

    M220 S100
    M221 S100
    SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
	SET_STEPPER_ENABLE STEPPER=extruder enable=0
	
    DISABLE_ALL_SENSOR
    BED_MESH_CLEAR
    G31
    CLEAR_LAST_FILE
    M84
    BEEP I=2 DUR=500

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    {% if (printer.gcode_move.position.z) < 200 %}
        G1 Z200 F600                                      
    {% endif %}
    {% if (printer.gcode_move.position.y) > 300 %}
        G1 Y250 F6000
    {% endif %}
    G1  X0 Y0 F7800
    save_zoffset
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    CLEAR_PAUSE

    M106 P2 S0
    M106 P0 S0
    M106 P3 S0
    
    M104 S0
    M140 S0
    M141 S0
    {% if printer["box_extras"] is defined %}
        DISABLE_BOX_HEATER
    {% endif %}

    M220 S100
    M221 S100
    SET_STEPPER_ENABLE STEPPER=stepper_x enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_y enable=0
	SET_STEPPER_ENABLE STEPPER=stepper_z enable=1
    SET_STEPPER_ENABLE STEPPER=stepper_z1 enable=1
	SET_STEPPER_ENABLE STEPPER=extruder enable=0
	
    DISABLE_ALL_SENSOR
    BED_MESH_CLEAR
    G31
    BEEP I=2 DUR=500

    M84
    SDCARD_RESET_FILE
    BASE_CANCEL_PRINT
    CLEAR_LAST_FILE

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set z = params.Z|default(35)|int %}
    
    {% if printer['pause_resume'].is_paused|int == 0 %}     
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE={z}
        SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=etemp VALUE={printer['extruder'].target}
        {% if printer["fan_generic auxiliary_cooling_fan"] is defined %}
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=efan VALUE={printer["fan_generic auxiliary_cooling_fan"].speed *255}
        {% else %}
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=efan VALUE=0
        {% endif %}

        DISABLE_ALL_SENSOR
        SAVE_GCODE_STATE NAME=PAUSE              
        BASE_PAUSE
        G92 E0
        G1 E-5 F1800
        {% if (printer.gcode_move.position.z ) < z %}
            G91
            G1 Z{z} F900
        {% else %}
            G91
            G1 Z{5} F900 
            SET_GCODE_VARIABLE MACRO=RESUME_PRINT VARIABLE=zhop VALUE=0
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSEPARK2
        G90
        G1 X95 F12000
        G1 Y312 F12000
        G1 Y316 F600
        G1 Y320 F9000
        G1 Y324 F600
        SAVE_GCODE_STATE NAME=PAUSEPARK
        M104 S0
        SET_IDLE_TIMEOUT TIMEOUT=86400
        SET_STEPPER_ENABLE STEPPER=extruder enable=0
        {% set slot_sync = printer.save_variables.variables.slot_sync|default("slot-1") %}
        {% if printer['box_stepper ' ~ slot_sync] %}
            SET_STEPPER_ENABLE STEPPER='box_stepper '{slot_sync} enable=0
        {% endif %}
    {% endif %}

[gcode_macro RESUME_PRINT]
variable_zhop: 0
variable_etemp: 0
variable_efan: 0
gcode:
    {% set e = params.E|default(5)|int %}
    {% set tool_change = params.TOOL_CHANGE|default(0)|int %}
    
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if printer.save_variables.variables.box_count|default(0)|int >= 1 and printer.save_variables.variables.enable_box|default(0)|int == 1 and printer.save_variables.variables.is_tool_change|default(0)|int == 1 and printer["box_extras"] is defined %}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            MOVE_TO_TRASH
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            M83
            RESTORE_GCODE_STATE NAME=PAUSEPARK2 MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME  
        {% else %}
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
            {% if etemp > 0 %}
                M109 S{etemp|int}
            {% endif %}
            {% if printer.save_variables.variables.box_count|default(0)|int >= 1 %}
                SAVE_VARIABLE VARIABLE=retry_step VALUE=None
            {% endif %}
            M83              
            M106 S0
            G1 X95 F12000
            G1 Y324 F12000                
            G92 E0
            G1 E5 F50
            G92 E0
            G1 E50 F200
            G92 E0
            G1 E-0.8 F200
            G4 P300

            M106 S{efan}

            G1 Y318 F30000
            G1 Y322 F3000
            G1 Y318 F30000
            G1 Y322 F3000
            G1 Y318 F30000
            G1 Y322 F3000
            G1 Y324 F600

            G1 X58 F12000
            G1 X78 F12000
            G1 X58 F12000
            G1 X78 F12000
            G1 X58 F12000
            G1 X78 F12000
            G1 X58 F12000
            G1 X78 F12000
            G1 X58 F12000
            G1 X78 F12000
            G1 X58 F12000
            G1 X78 F12000
            G1 X95 F12000

            G1 Y316 F9000
            G1 Y312 F600
            G1 Y260 F12000 
            RESTORE_GCODE_STATE NAME=PAUSEPARK2 MOVE=1 MOVE_SPEED=200                            
            RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=15
            BASE_RESUME  
            {% if tool_change == 0 %}
                ENABLE_ALL_SENSOR
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    {% set box_count = printer.save_variables.variables.box_count|default(0)|int %}
    {% set box_enabled = printer.save_variables.variables.enable_box|default(0)|int %}
    {% set has_filament = 1 %}
    {% if printer["hall_filament_width_sensor"] is defined %}
        {% set has_filament = 1 if printer['hall_filament_width_sensor'].Diameter > 0.5 else 0 %}
    {% endif %}
    {% if printer['pause_resume'].is_paused|int == 1 %}
        {% if box_count >= 1 %}
            {% if box_enabled == 1 and printer["box_extras"] is defined %}
                TRY_RESUME_PRINT
            {% else %}
                {% if has_filament %}
                    RESUME_PRINT
                {% else %}
                    M118 Printer resume failed
                {% endif %}
            {% endif %}
        {% else %}
            {% if has_filament %}
                RESUME_PRINT
            {% else %}
                M118 Printer resume failed
            {% endif %}
        {% endif %}
    {% endif %}

[gcode_macro BEEP]
gcode:
    {% set i = params.I|default(1)|int %}
    {% set dur = params.DUR|default(100)|int %}
    {% for iteration in range(i|int) %}
        G4 P{dur}
    {% endfor %}



[gcode_macro M141]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
        SET_HEATER_TEMPERATURE HEATER=chamber TARGET={([s, 65]|min)}
        # {% if printer['heater_bed'].target < s+25 and s!=0 %}
        #     M140 S{s+25}
        #     M118 If the heatbed is below {s+25} degrees, the heatbed temperature will be automatically set to {s+25}.
        # {% endif %}
    {% endif %}


[gcode_macro M191]
gcode:
    {% if printer["heater_generic chamber"] is defined %}
        {% set s = params.S|float %}
    
        M141 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}  
        {% if s != 0 %}
            TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={([s, 65]|min)-2}
        {% endif %}
    {% endif %}

[gcode_macro M106]
gcode:
    {% set p = params.P|default(0)|int %}

    {% if p == 2 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 0 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED={(params.S|float / 255.0)}
        
    {% else %}
        SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=1
    {% endif %}
    {% endif %} 

    {% if p == 3 %}
    {% if params.S is defined %}
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED={(params.S|float / 255.0)}
    {% else %}
        SET_FAN_SPEED FAN=chamber_circulation_fan SPEED=1
    {% endif %}
    {% endif %} 

[gcode_macro M107]
gcode:  
    SET_FAN_SPEED FAN=auxiliary_cooling_fan SPEED=0

[gcode_macro M303]
gcode:
    {% if params.E is defined %}
     {% if params.S is defined %}
        {% if (params.E|int)==-1 %} 
         PID_CALIBRATE HEATER=heater_bed TARGET={params.S|int}
        {% endif %}
        {% if (params.E|int)==0 %}
         PID_CALIBRATE HEATER=extruder TARGET={params.S|int}
        {% endif %}
     {% endif %}
  {% endif %}

[gcode_macro M8029]
gcode:
     {% if params.D is defined %}
       {% if (params.D|int)==1 %} 
        {% if printer["hall_filament_width_sensor"] is defined %}
            ENABLE_FILAMENT_WIDTH_SENSOR
        {% endif %}
       {% endif %}
       {% if (params.D|int)==0 %} 
        {% if printer["hall_filament_width_sensor"] is defined %}
            DISABLE_FILAMENT_WIDTH_SENSOR
        {% endif %}
       {% endif %}
     {% endif %}

[gcode_macro M900]
gcode:
    {% if params.K is defined %} 
          SET_PRESSURE_ADVANCE ADVANCE={params.K}
    {% endif %}  
    {% if params.T is defined %}    
       SET_PRESSURE_ADVANCE SMOOTH_TIME={params.T}
    {% endif %} 

[gcode_macro M290]
gcode:
   SET_GCODE_OFFSET Z_ADJUST={params.Z}

[gcode_macro M901]
gcode:
    G28
    SHAPER_CALIBRATE
    M118 Input shaping complete
    SAVE_CONFIG
       
[gcode_macro M0]
gcode:
    PAUSE

[gcode_macro M25]
rename_existing: M9925
gcode:
    PAUSE

[gcode_macro RESPOND_INFO]
variable_S:0
gcode:
    {% if params.S is defined %}
        {% set s = params.S|int %}
        {% if s == 0 %}
            { action_respond_info("Nozzle cooled")  }
        {% endif %}
    {% endif %}

[gcode_macro M4027]
gcode:
    G29

[gcode_macro M4028]
description: Home the printer with Beacon contact homing
gcode:
    G28
    M400
    M118 Position init complete
    
[gcode_macro M4029]
description: Clear the nozzle and run an adaptive Beacon mesh
gcode:
    M104 S0
    M141 S0
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=260
    G28
    M400
    CLEAR_NOZZLE HOTEND=250
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=260
    G29
    M118 Adaptive Beacon mesh complete

[gcode_macro M4030]
description: Home and move to the Beacon reference point safely
gcode:
    G28
    _BEACON_QIDI_CENTER
    G1 Z10 F600
    M118 Toolhead moved to Beacon reference point

[gcode_macro M4031]
gcode:
    RESPOND TYPE=error MSG="M4031 reverse homing is disabled on the Max EZ Beacon contact build."

[gcode_macro M603]
description: Unload filament
gcode:
    {% set hotendtemp = params.S|default(250)|int %}
    {% set accel = printer.toolhead.max_accel|int %}
    _CG28
    M204 S10000
    G1 Y150 F9000
    G1 X305 F9000
    G1 Y20 F9000
    G1 Y5 F3000
    G4 P500
    G1 Y20 F9000
    G1 Y5 F3000
    G4 P500
    G1 Y20 F9000
    
    G1 X56  F12000
    G1 Y310 F12000
    G1 Y324 F600
    G1 X95  F600

    M106 S0
    M109 S{hotendtemp}
    M118 Heat up complete

    G92 E0
    G1 E5 F50
    G1 E50 F200
    G92 E0
    G1 E-0.8 F200
    G4 P300

    M106 S255
    M104 S{hotendtemp-100}   
    G4 P5000


    G1 Y318 F9000
    G1 Y322 F600
    G1 Y318 F9000
    G1 Y322 F600
    G1 Y308 F30000
    G1 Y324 F600

    M106 S0
    M400
    M204 S{accel}
    M118 Unload finish

[gcode_macro M604]
description: Load filament
gcode:
    {% set hotendtemp = params.S|default(250)|int %}
    {% set current_state = params.F|default(1)|int %}
    {% set accel = printer.toolhead.max_accel|int %}
    M204 S10000
    M104 S{hotendtemp}
    _CG28
    {% if current_state == 1 %}
        {% if (printer.gcode_move.position.y) > 300 %}
            G91
            G1 Y-20 F9000
            G90
        {% endif %}
        G1 X95 F12000
        G1 Y312 F12000
        G1 Y316 F600
        G1 Y320 F9000
        G1 Y324 F600
    {% endif %}
    M109 S{hotendtemp}
    M118 Heat up complete

    G1 X95 F600
    G1 Y324 F600
    G92 E0
    G1 E5 F50
    G92 E0
    G1 E120 F300
    G92 E0
    G1 E-0.8 F200
    G4 P300

    M106 S255
    M104 S{hotendtemp-100}    
    G4 P5000

    G1 Y318 F9000
    G1 Y322 F600
    G1 Y318 F9000
    G1 Y322 F600
    G1 Y308 F30000
    G1 Y324 F600

    M106 S0

    M400
    M204 S{accel}
    M118 Load finish

