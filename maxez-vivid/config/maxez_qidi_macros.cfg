#[output_pin sound]
# No Max EZ beeper pin is assigned in this build.
#pin: PA1
#value: 0

[gcode_macro beep_on]
gcode:
    RESPOND MSG="Beeper output is not assigned on the Max EZ build"
    
[gcode_macro beep_off]
gcode:
    RESPOND MSG="Beeper output is not assigned on the Max EZ build"


[gcode_macro M109]
description: Temporary stub while EBB/extruder is disabled for motion bring-up
gcode:
    RESPOND TYPE=error MSG="M109 is disabled while the EBB/extruder is commented out for motion bring-up"

[exclude_object]

[gcode_macro G31]
gcode:
    SET_GCODE_VARIABLE MACRO=G29 VARIABLE=k VALUE=1

[gcode_macro G32]
gcode:
    SET_GCODE_VARIABLE MACRO=G29 VARIABLE=k VALUE=0

[gcode_macro G29]
variable_k:1
variable_bed_meshing_offset: -0.4
description: Prepare print bed, generate a bed mesh, and apply global Z nozzle offset
gcode:
    {% set temp = printer["heater_generic chamber"].target|default(0)|float %}
    {% set z_home_x = printer.configfile.settings.beacon.home_xy_position[0] %}
    {% set z_home_y = printer.configfile.settings.beacon.home_xy_position[1] %}
    {% set bmo = [([(printer["gcode_macro G29"].bed_meshing_offset)|float, -1.0]|max), 1.0]|min %}
    {% set mesh_closer = (2.0 + bmo)|float %}
    {% set mesh_return = (2.0 - bmo)|float %}
    { action_respond_info("  Mesh Closer = %.2f" % (mesh_closer)|float) }
    { action_respond_info("  Mesh Return = %.2f" % (mesh_return)|float) }

    M141 S0
    {% if temp > 0 %}
        G4 P15000
    {% endif %}
    BED_MESH_CLEAR
    _FIND_Z_EQUALS_ZERO
    G1 X{z_home_x} Y{z_home_y} F7200
    G1 Z{mesh_closer} F600
    SET_KINEMATIC_POSITION Z=2.0
    {% if k|int == 1 %}
        BED_MESH_CALIBRATE RUNS=2 PROFILE=kamp
        BED_MESH_PROFILE LOAD=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        M118 Beacon bed mesh calibrated (kamp)
    {% else %}
        BED_MESH_CALIBRATE RUNS=2 PROFILE=default
        BED_MESH_PROFILE LOAD=default
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
        SET_GCODE_VARIABLE MACRO=G29 VARIABLE=k VALUE=1
        M118 Beacon bed mesh calibrated (default)
    {% endif %}
    G1 X{z_home_x} Y{z_home_y} F7200
    G1 Z{mesh_return} F600
    SET_KINEMATIC_POSITION Z=2.0
    M141 S{temp}

[gcode_macro M204]
rename_existing: M99204
gcode:
    {% if params.S is defined %}
        {% set s = params.S|float %}
    {% endif %}
    {% if params.P is defined %}
    {% if params.T is defined %}
        {% set s = [params.P|float ,params.T|float] | min %}
    {% endif %}
    {% endif %}

    SET_VELOCITY_LIMIT ACCEL={s}

[gcode_macro Z_VIBRATE]
gcode:
    RESPOND MSG="Z_VIBRATE is disabled on the Max EZ build until a shaker output pin is assigned."

[gcode_macro BOX_DRY_ON]
description: Enable Qidi Box drying through the stock box controller
gcode:
    {% set box = params.BOX|default(1)|int %}
    {% set temp = params.TEMP|default(40)|int %}
    {% set box_count = printer.save_variables.variables.box_count|default(0)|int %}
    {% set box_enabled = printer.save_variables.variables.enable_box|default(0)|int %}
    {% if printer["box_extras"] is not defined %}
        { action_raise_error("Qidi Box Klipper extras are not active on this build") }
    {% endif %}
    {% if box_enabled != 1 or box_count < box %}
        { action_raise_error("Qidi Box is not enabled for BOX " ~ box) }
    {% endif %}
    ENABLE_BOX_DRY BOX={box} TEMP={temp}
    RESPOND MSG="Qidi Box {box} drying requested at {temp}C"

[gcode_macro BOX_DRY_OFF]
description: Disable Qidi Box drying through the stock box controller
gcode:
    {% set box = params.BOX|default(1)|int %}
    {% if printer["box_extras"] is defined %}
        DISABLE_BOX_DRY BOX={box}
        RESPOND MSG="Qidi Box {box} drying disabled"
    {% else %}
        RESPOND TYPE=error MSG="Qidi Box Klipper extras are not active on this build"
    {% endif %}

[gcode_macro BOX_DRY_FORCE_ON]
description: Force the active box heater on, bypassing stock dry-state gating
gcode:
    {% set temp = params.TEMP|default(40)|int %}
    {% if printer["heater_generic heater_box1"] is defined %}
        SET_HEATER_TEMPERATURE HEATER=heater_box1 TARGET={temp}
        RESPOND MSG="Qidi Box heater forced to {temp}C"
    {% else %}
        RESPOND TYPE=error MSG="Qidi Box heater is not configured"
    {% endif %}

[gcode_macro BOX_DRY_FORCE_OFF]
description: Force the active box heater off
gcode:
    {% if printer["heater_generic heater_box1"] is defined %}
        SET_HEATER_TEMPERATURE HEATER=heater_box1 TARGET=0
        RESPOND MSG="Qidi Box heater forced off"
    {% else %}
        RESPOND TYPE=error MSG="Qidi Box heater is not configured"
    {% endif %}

[gcode_macro BOX_DRY_STATUS]
description: Report the live Qidi Box drying temperatures and target
gcode:
    RESPOND MSG="Querying live Qidi Box temperatures..."
