# QIDI Plus4 V1.0.0

[gcode_macro _CG28]
gcode:
    {% set homed = printer.toolhead.homed_axes|string|lower %}
    {% if "y" not in homed %}
        G28 Y
    {% endif %}
    {% if "x" not in homed %}
        G28 X
    {% endif %}
    {% if "z" not in homed %}
        G28 Z
    {% endif %}

[gcode_macro zoffset]
gcode:
    SET_GCODE_OFFSET Z={printer.probe.last_z_result} MOVE=1

# Development test
[gcode_macro _BEACON_QIDI_CENTER]
description: Move the nozzle to the bed center using Beacon offsets
variable_travel_speed: 7800
gcode:
    {% set bx = printer.configfile.settings.beacon.x_offset|float %}
    {% set by = printer.configfile.settings.beacon.y_offset|float %}
    {% set x = 150.0 - bx %}
    {% set y = 150.0 - by %}
    G90
    G1 X{x} Y{y} F{travel_speed}

[gcode_macro _BEACON_QIDI_Z_DISABLED]
description: Safety gate while migrating the Qidi Z workflow to Beacon contact
variable_reason: "Beacon contact Z workflow is not finished yet. Z homing, Z offset, and bed mesh are still blocked to prevent another crash."
gcode:
    { action_raise_error(printer["gcode_macro _BEACON_QIDI_Z_DISABLED"].reason) }

[gcode_macro test_zoffset]
gcode:
    _BEACON_QIDI_Z_DISABLED

[gcode_macro move_subzoffset]
gcode:
    _BEACON_QIDI_Z_DISABLED

[gcode_macro get_zoffset]
gcode:
    _BEACON_QIDI_Z_DISABLED

[gcode_macro save_zoffset]
gcode:
    {% if printer.gcode_move.homing_origin.z < 0.5 %}
       SAVE_VARIABLE VARIABLE=z_offset VALUE={printer.gcode_move.homing_origin.z}
    {% endif %}

[gcode_macro set_zoffset]        
gcode:
    {% set z = printer.save_variables.variables.z_offset %}
    SET_GCODE_OFFSET Z={z} MOVE=0

