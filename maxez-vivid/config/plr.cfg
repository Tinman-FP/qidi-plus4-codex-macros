[gcode_shell_command POWER_LOSS_RESUME]
command: bash /home/pi/scripts/plr/plr.sh
timeout: 120

[gcode_shell_command UPDATE_GCODE_LINES]
command: bash /home/pi/scripts/plr/update_gcode_lines.sh

[gcode_shell_command SYNC]
command: sync
timeout: 2

[gcode_macro _MAXEZ_PLR_CAPTURE_STATE]
description: Persist live Max EZ print state for power-loss recovery
gcode:
    {% set filepath = printer.virtual_sdcard.file_path|default("", true)|string %}
    {% if filepath in ["None", "none"] %}
        {% set filepath = "" %}
    {% endif %}
    {% set filename = filepath.split('/') %}
    {% if filepath != "" %}
        SAVE_VARIABLE VARIABLE=last_file VALUE='"{ filename[-1] }"'
        SAVE_VARIABLE VARIABLE=filepath VALUE='"{ filepath }"'
        SAVE_VARIABLE VARIABLE=file_path VALUE='"{ filepath }"'
    {% endif %}
    SAVE_VARIABLE VARIABLE=plr_file_position VALUE={printer.virtual_sdcard.file_position|default(0)|int}
    {% if params.LAYER is defined %}
        SAVE_VARIABLE VARIABLE=plr_current_layer VALUE={params.LAYER|int}
    {% endif %}
    SAVE_VARIABLE VARIABLE=power_resume_z VALUE={printer.gcode_move.gcode_position.z|float}

[gcode_macro save_last_file]
description: Mark the active file as recoverable and persist temperatures
gcode:
    _MAXEZ_PLR_CAPTURE_STATE
    {% set filepath = printer.virtual_sdcard.file_path|default("", true)|string %}
    {% if filepath in ["None", "none"] %}
        {% set filepath = "" %}
    {% endif %}
    {% set filename = filepath.split('/') %}
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=True
    SAVE_VARIABLE VARIABLE=print_temp VALUE={printer.extruder.target}
    SAVE_VARIABLE VARIABLE=bed_temp VALUE={printer['heater_bed'].target}
    {% if printer["heater_generic chamber"] is defined %}
        SAVE_VARIABLE VARIABLE=hot_temp VALUE={printer['heater_generic chamber'].target}
    {% else %}
        SAVE_VARIABLE VARIABLE=hot_temp VALUE=0
    {% endif %}
    M118 Last File: { filename[-1] if filepath != "" else "none" }
    M117 Last File: { filename[-1] if filepath != "" else "none" }
    RUN_SHELL_COMMAND CMD=SYNC
    G4 P2000

[gcode_macro CLEAR_LAST_FILE]
description: Clear Max EZ power-loss recovery state after a clean completion/cancel
gcode:
    SAVE_VARIABLE VARIABLE=last_file VALUE='""'
    SAVE_VARIABLE VARIABLE=filepath VALUE='""'
    SAVE_VARIABLE VARIABLE=file_path VALUE='""'
    SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
    SAVE_VARIABLE VARIABLE=gcode_lines VALUE=0
    SAVE_VARIABLE VARIABLE=power_resume_z VALUE=0
    SAVE_VARIABLE VARIABLE=plr_current_layer VALUE=0
    SAVE_VARIABLE VARIABLE=plr_file_position VALUE=0
    RUN_SHELL_COMMAND CMD=SYNC

[gcode_macro LOG_Z]
description: Manually persist the current Z position for PLR debugging
gcode:
    {% set z_pos = printer.gcode_move.gcode_position.z %}
    RESPOND MSG="Current Z is {z_pos}"
    SAVE_VARIABLE VARIABLE=power_resume_z VALUE={z_pos}

[gcode_macro RESUME_INTERRUPTED]
description: Validate saved Max EZ PLR state and run the generated recovery file
gcode:
    set_zoffset
    RUN_SHELL_COMMAND CMD=UPDATE_GCODE_LINES
    {% if params.PROFILE_NAME is defined %}
        _MAXEZ_PLR_RESUME_AFTER_UPDATE PROFILE_NAME={params.PROFILE_NAME}
    {% else %}
        _MAXEZ_PLR_RESUME_AFTER_UPDATE
    {% endif %}

[gcode_macro _MAXEZ_PLR_RESUME_AFTER_UPDATE]
description: Validate saved Max EZ PLR state after line-count refresh
gcode:
    {% set svv = printer.save_variables.variables %}
    {% set was_interrupted = svv.was_interrupted|default(False) %}
    {% set saved_profile = svv.profile_name|default("default")|string %}
    {% set requested_profile = params.PROFILE_NAME|default(saved_profile)|string %}
    {% set z_height = params.Z_HEIGHT|default(svv.power_resume_z|default(0))|float %}
    {% set last_file = params.GCODE_FILE|default(svv.last_file|default(""))|string %}
    {% set filepath = params.FILE_PATH|default(svv.filepath|default(svv.file_path|default("")))|string %}
    {% set print_temp = params.PRINT_TEMP|default(svv.print_temp|default(0))|float %}
    {% set bed_temp = params.BED_TEMP|default(svv.bed_temp|default(0))|float %}
    {% set hot_temp = params.HOT_TEMP|default(svv.hot_temp|default(0))|float %}
    {% set file_position = svv.plr_file_position|default(0)|int %}
    {% set gcode_lines = svv.gcode_lines|default(0)|int %}
    {% set mesh_profiles = printer["bed_mesh"].profiles %}
    {% if not was_interrupted %}
        { action_raise_error("RESUME_INTERRUPTED refused: no interrupted print is recorded") }
    {% endif %}
    {% if printer.virtual_sdcard.is_active %}
        { action_raise_error("RESUME_INTERRUPTED refused: virtual_sdcard is already active") }
    {% endif %}
    {% if last_file in ["", "None", "default"] or filepath in ["", "None", "default"] %}
        { action_raise_error("RESUME_INTERRUPTED refused: missing saved file path/name for PLR") }
    {% endif %}
    {% if z_height <= 0 %}
        { action_raise_error("RESUME_INTERRUPTED refused: missing saved Z height for PLR") }
    {% endif %}
    {% if file_position <= 0 and gcode_lines <= 0 %}
        { action_raise_error("RESUME_INTERRUPTED refused: missing saved file position/line count for PLR") }
    {% endif %}
    {% if requested_profile in mesh_profiles %}
        {% set profile_name = requested_profile %}
    {% elif "default" in mesh_profiles %}
        {% set profile_name = "default" %}
        M118 Missing bed mesh profile {requested_profile}; loading default for interrupted resume
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"default"'
    {% else %}
        { action_raise_error("RESUME_INTERRUPTED could not find bed mesh profile " ~ requested_profile ~ " or default") }
    {% endif %}
    M118 Resuming interrupted Max EZ print: {last_file}
    M118 PLR state: z={z_height} layer={svv.plr_current_layer|default(0)} pos={file_position} lines={gcode_lines}
    BED_MESH_PROFILE LOAD={profile_name}
    RUN_SHELL_COMMAND CMD=POWER_LOSS_RESUME PARAMS="{z_height} \"{last_file}\" {print_temp} {bed_temp} {hot_temp} \"{filepath}\" {file_position} {gcode_lines}"
    SDCARD_PRINT_FILE FILENAME=/.plr/plr.gcode
