[gcode_macro PRINT_START_PRODUCTION]
description: Lighter production start for the Qidi Plus4 with optional soak, Z tilt, and heavy nozzle clear
variable_heat_soak_minutes: 0
variable_use_z_tilt: 1
variable_use_heavy_clear: 0
variable_use_adaptive_mesh: 1
variable_use_adaptive_heat_soak: 1
variable_heat_soak_mesh_threshold: 0.015
variable_heat_soak_mesh_interval_seconds: 60
variable_heat_soak_mesh_settle_seconds: 60
variable_heat_soak_mesh_max_iterations: 8
gcode:
    AUTOTUNE_SHAPERS
    DISABLE_ALL_SENSOR
    CLEAR_PAUSE

    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.HOTEND|int %}
    {% set chambertemp = params.CHAMBER|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set soak_minutes = params.SOAKE|default(printer["gcode_macro PRINT_START_PRODUCTION"].heat_soak_minutes)|int %}
    {% set soak_ms = soak_minutes * 60 * 1000 %}
    {% set use_z_tilt = params.ZTILT|default(printer["gcode_macro PRINT_START_PRODUCTION"].use_z_tilt)|int %}
    {% set use_heavy_clear = params.HEAVY_CLEAR|default(printer["gcode_macro PRINT_START_PRODUCTION"].use_heavy_clear)|int %}
    {% set use_mesh = params.MESH|default(printer["gcode_macro PRINT_START_PRODUCTION"].use_adaptive_mesh)|int %}
    {% set use_heat_soak_mesh = params.HEAT_SOAK_MESH|default(printer["gcode_macro PRINT_START_PRODUCTION"].use_adaptive_heat_soak)|int %}
    {% set heat_soak_threshold = params.HEAT_SOAK_THRESHOLD|default(printer["gcode_macro PRINT_START_PRODUCTION"].heat_soak_mesh_threshold)|float %}
    {% set heat_soak_interval = params.HEAT_SOAK_INTERVAL|default(printer["gcode_macro PRINT_START_PRODUCTION"].heat_soak_mesh_interval_seconds)|int %}
    {% set heat_soak_settle = params.HEAT_SOAK_SETTLE|default(printer["gcode_macro PRINT_START_PRODUCTION"].heat_soak_mesh_settle_seconds)|int %}
    {% set heat_soak_max_iterations = params.HEAT_SOAK_MAX_ITERATIONS|default(printer["gcode_macro PRINT_START_PRODUCTION"].heat_soak_mesh_max_iterations)|int %}

    set_zoffset
    M104 S0
    M106 P2 S0
    M106 P3 S0
    M106 S255
    {% if "xyz" in printer.toolhead.homed_axes %}
        G0 X50 Y50 F6000
    {% endif %}
    M106 S0
    BED_MESH_CLEAR

    M118 Production start: chamber circulation fan to 100% before heat-up
    M106 P3 S255
    M118 Production start: heating bed, chamber, and nozzle together
    M141 S{chambertemp}
    M140 S{bedtemp}
    M104 S{hotendtemp}
    M190 S{bedtemp}
    {% if chambertemp > 0 %}
        M191 S{chambertemp}
    {% endif %}
    M109 S{hotendtemp}

    {% if soak_minutes > 0 %}
        M118 Production heat soak for {soak_minutes} minute(s)
        G4 P{soak_ms}
    {% endif %}

    {% if use_mesh and use_heat_soak_mesh and chambertemp > 0 and heat_soak_settle > 0 %}
        M118 Production adaptive heat-soak thermal settle for {heat_soak_settle}s before homing
        G4 P{heat_soak_settle * 1000}
    {% endif %}

    M118 Production home before nozzle clear
    G28

    {% if use_z_tilt %}
        M118 Production Z tilt adjust
        Z_TILT_ADJUST
    {% endif %}

    {% if use_mesh and use_heat_soak_mesh and chambertemp > 0 %}
        QIDI_ADAPTIVE_HEAT_SOAK_MESH CHAMBER={chambertemp} THRESHOLD={heat_soak_threshold} INTERVAL={heat_soak_interval} SETTLE=0 MAX_ITERATIONS={heat_soak_max_iterations}
        M118 Production final home after adaptive heat-soak mesh
        G28
        {% if use_z_tilt %}
            M118 Production final Z tilt adjust after adaptive heat-soak mesh
            Z_TILT_ADJUST
        {% endif %}
        M118 Production final adaptive mesh after heat-soak stabilization
        {% set final_mesh_chamber_target = printer["heater_generic chamber"].target|default(chambertemp)|float %}
        M141 S0
        {% if final_mesh_chamber_target > 0 %}
            G4 P15000
        {% endif %}
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        M118 Beacon final bed mesh calibrated (kamp)
        M141 S{final_mesh_chamber_target}
    {% endif %}

    {% if use_heavy_clear %}
        M118 Production heavy nozzle clear
        CLEAR_NOZZLE HOTEND={hotendtemp}
        M104 S140
        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=260
        M109 S{hotendtemp}
    {% else %}
        M118 Production light nozzle clear
        CLEAR_NOZZLE_PLR HOTEND={hotendtemp}
    {% endif %}

    {% if use_mesh and not (use_heat_soak_mesh and chambertemp > 0) %}
        M118 Production adaptive mesh without post-wipe re-home
        {% set mesh_chamber_target = printer["heater_generic chamber"].target|default(0)|float %}
        M141 S0
        {% if mesh_chamber_target > 0 %}
            G4 P15000
        {% endif %}
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        M118 Beacon bed mesh calibrated (kamp)
        M141 S{mesh_chamber_target}
    {% elif use_mesh %}
        M118 Production adaptive heat-soak mesh complete
    {% else %}
        M118 Production mesh skipped
    {% endif %}
    G0 Z20 F600
    G0 X5 Y5 F6000

    {% if printer.save_variables.variables.box_count|default(0)|int >= 1 %}
        SAVE_VARIABLE VARIABLE=load_retry_num VALUE=0
        SAVE_VARIABLE VARIABLE=retry_step VALUE=None
        SAVE_VARIABLE VARIABLE=is_tool_change VALUE=0
        {% for i in range(16) %}
            SAVE_VARIABLE VARIABLE=runout_{i} VALUE=0
            G4 P100
        {% endfor %}
        SAVE_VARIABLE VARIABLE=extrude_state VALUE=-1
        {% if printer.save_variables.variables.enable_box|default(0)|int == 1 and printer["box_extras"] is defined %}
            BOX_PRINT_START EXTRUDER={extruder} HOTENDTEMP={hotendtemp}
            M400
            EXTRUSION_AND_FLUSH HOTEND={hotendtemp}
        {% elif printer.save_variables.variables.enable_box|default(0)|int == 1 %}
            RESPOND TYPE=error MSG="Qidi Box requested, but Qidi Box Klipper extras are not active"
        {% endif %}
    {% endif %}

    {% if chambertemp == 0 %}
        M106 P3 S255
    {% endif %}
    M109 S{hotendtemp}
    M141 S{chambertemp}
    M204 S10000
    SET_PRINT_STATS_INFO CURRENT_LAYER=1
    ENABLE_ALL_SENSOR
    save_last_file

[gcode_macro PRINT_START_PRODUCTION_STATUS]
description: Report the current defaults for the lighter Qidi production start
gcode:
    RESPOND MSG="PRINT_START_PRODUCTION soak={printer['gcode_macro PRINT_START_PRODUCTION'].heat_soak_minutes|int}m ztilt={printer['gcode_macro PRINT_START_PRODUCTION'].use_z_tilt|int} heavy_clear={printer['gcode_macro PRINT_START_PRODUCTION'].use_heavy_clear|int} mesh={printer['gcode_macro PRINT_START_PRODUCTION'].use_adaptive_mesh|int} heat_soak_mesh={printer['gcode_macro PRINT_START_PRODUCTION'].use_adaptive_heat_soak|int} threshold={printer['gcode_macro PRINT_START_PRODUCTION'].heat_soak_mesh_threshold|float} interval={printer['gcode_macro PRINT_START_PRODUCTION'].heat_soak_mesh_interval_seconds|int}s settle={printer['gcode_macro PRINT_START_PRODUCTION'].heat_soak_mesh_settle_seconds|int}s max_iter={printer['gcode_macro PRINT_START_PRODUCTION'].heat_soak_mesh_max_iterations|int}"

[gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH]
description: Re-run adaptive mesh during heat soak until consecutive meshes change negligibly
variable_last_mesh: []
variable_last_delta: 999.0
variable_iteration: 0
variable_stable: 0
variable_threshold: 0.015
variable_interval_seconds: 60
variable_settle_seconds: 60
variable_max_iterations: 8
gcode:
    {% set threshold = params.THRESHOLD|default(printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"].threshold)|float %}
    {% set interval = params.INTERVAL|default(printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"].interval_seconds)|int %}
    {% set settle = params.SETTLE|default(printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"].settle_seconds)|int %}
    {% set max_iterations = params.MAX_ITERATIONS|default(printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"].max_iterations)|int %}
    {% set chamber = params.CHAMBER|default(printer["heater_generic chamber"].target|default(0))|float %}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=last_mesh VALUE="[]"
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=last_delta VALUE=999.0
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=iteration VALUE=0
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=stable VALUE=0
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=threshold VALUE={threshold}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=interval_seconds VALUE={interval}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=settle_seconds VALUE={settle}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=max_iterations VALUE={max_iterations}
    M141 S{chamber}
    {% if settle > 0 %}
        M118 Adaptive heat-soak mesh: chamber stable, settling {settle}s before first mesh
        G4 P{settle * 1000}
    {% endif %}
    {% for i in range(1, max_iterations + 1) %}
        QIDI_ADAPTIVE_HEAT_SOAK_MESH_ITERATION ITER={i}
        QIDI_ADAPTIVE_HEAT_SOAK_MESH_WAIT
    {% endfor %}
    QIDI_ADAPTIVE_HEAT_SOAK_MESH_DONE

[gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH_ITERATION]
description: One adaptive heat-soak mesh pass, skipped once stable
gcode:
    {% set state = printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"] %}
    {% set iteration = params.ITER|default(1)|int %}
    {% if state.stable|int == 0 %}
        M118 Adaptive heat-soak mesh pass {iteration}/{state.max_iterations|int}
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE PROFILE=kamp
        SAVE_VARIABLE VARIABLE=profile_name VALUE='"kamp"'
        M400
        QIDI_ADAPTIVE_HEAT_SOAK_MESH_COMPARE ITER={iteration}
    {% endif %}

[gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH_COMPARE]
description: Compare the newest probed matrix to the previous heat-soak mesh
gcode:
    {% set state = printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"] %}
    {% set iteration = params.ITER|default(1)|int %}
    {% set mesh = printer.bed_mesh.probed_matrix|default([]) %}
    {% set last = state.last_mesh|default([]) %}
    {% set ns = namespace(max_delta=0.0, comparable=1, point_count=0) %}
    {% if mesh|length == 0 %}
        {% set ns.comparable = 0 %}
    {% elif last|length != mesh|length %}
        {% set ns.comparable = 0 %}
    {% else %}
        {% for y in range(mesh|length) %}
            {% if last[y]|length != mesh[y]|length %}
                {% set ns.comparable = 0 %}
            {% else %}
                {% for x in range(mesh[y]|length) %}
                    {% set ns.point_count = ns.point_count + 1 %}
                    {% set delta = (mesh[y][x]|float - last[y][x]|float)|abs %}
                    {% if delta > ns.max_delta %}
                        {% set ns.max_delta = delta %}
                    {% endif %}
                {% endfor %}
            {% endif %}
        {% endfor %}
    {% endif %}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=last_mesh VALUE="{mesh}"
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=last_delta VALUE={ns.max_delta}
    SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=iteration VALUE={iteration}
    {% if iteration == 1 or ns.comparable == 0 %}
        M118 Adaptive heat-soak mesh baseline captured
    {% elif ns.max_delta <= state.threshold|float %}
        SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=stable VALUE=1
        M118 Adaptive heat-soak mesh stable: max delta {ns.max_delta|round(4)}mm <= {state.threshold|float}mm
    {% elif iteration >= state.max_iterations|int %}
        SET_GCODE_VARIABLE MACRO=QIDI_ADAPTIVE_HEAT_SOAK_MESH VARIABLE=stable VALUE=1
        M118 Adaptive heat-soak mesh max iterations reached: last delta {ns.max_delta|round(4)}mm
    {% else %}
        M118 Adaptive heat-soak mesh changing: max delta {ns.max_delta|round(4)}mm > {state.threshold|float}mm
    {% endif %}

[gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH_WAIT]
description: Wait between adaptive heat-soak mesh passes while still changing
gcode:
    {% set state = printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"] %}
    {% if state.stable|int == 0 and state.iteration|int < state.max_iterations|int %}
        M118 Adaptive heat-soak mesh waiting {state.interval_seconds|int}s before next pass
        G4 P{state.interval_seconds|int * 1000}
    {% endif %}

[gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH_DONE]
description: Report adaptive heat-soak mesh loop completion
gcode:
    {% set state = printer["gcode_macro QIDI_ADAPTIVE_HEAT_SOAK_MESH"] %}
    M118 Adaptive heat-soak mesh complete after {state.iteration|int} pass(es); last delta {state.last_delta|float|round(4)}mm
