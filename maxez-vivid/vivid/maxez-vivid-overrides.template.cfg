# Copy confirmed values from this file into the BTT MMS config after install.
# Do not include this template directly as active Klipper config.

[mcu buffer]
serial: /dev/serial/by-id/<vivid-buffer-mcu>

[mcu vivid]
serial: /dev/serial/by-id/<vivid-main-mcu>

[mms]
# Keep BTT defaults unless the physical machine proves otherwise.
retry_times: 3
slot: 0,1,2,3
selector_name: manual_stepper selector_stepper
drive_name: manual_stepper drive_stepper
outlet: buffer:PA5
buffer_runout: buffer:PA4
dryer_heater: ViViD_Dryer
# entry_sensor: <wired-and-tested-filament-sensor-pin>
filament_detection_enable: 0
endless_spool_enable: 0

[mms cut]
# Disabled until a physical cutter path is mounted and jog-tested.
enable: 0
z_raise: 1.0
cut_speed: 2000
cutter_init_point: (100.0, 100.0)
cutter_final_point: (80.0, 100.0)

[mms delivery]
speed_selector: 150
accel_selector: 150
speed_drive: 80
accel_drive: 40
# Measure the real ViViD-to-Nebula path before production use.
bowden_distance: 1000
safety_retract_distance: 50
slots_loop_times: 200
custom_trsync_timeout: 0.05

[mms purge]
enable: 1
z_raise: 1.0
fan_cooldown_speed: 1.0
fan_cooldown_wait: 2.0
purge_speed: 300.0
orphan_filament_length: 60
purge_modifier: 2.5
retraction_compensation: 3.0
retract_speed: 10000.0
axis_first: Y
# Based on the Qidi Max EZ trash lane; verify manually before unattended use.
tray_point: (95.0, 324.0)
# custom_before: MOVE_TO_TRASH

[mms brush]
enable: 1
z_raise: 1.0
fan_cooldown_speed: 1.0
fan_cooldown_wait: 1.0
# Based on the existing Max EZ nozzle-cleaning path; verify with hardware.
wipe_points: (58.0, 324.0), (78.0, 324.0)
wipe_speed: 10000.0
wipe_times: 5
peck_point: (133.0, 321.0)
peck_speed: 10000.0
peck_depth: 2.0
peck_times: 0
